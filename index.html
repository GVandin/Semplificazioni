<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 8px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; border: 1px dashed #999; }
        .line { width: 400px; height: 4px; background: #333; margin: 10px 0; }
        .block { border: 3px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; font-size: 1.5em; transition: 0.2s; }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="Numeratore">
        <input type="text" id="denInput" placeholder="Denominatore">
        <button onclick="generateFraction()">Genera</button>
    </div>
    <div class="controls">
        <input type="text" id="splitInput" placeholder="Scomponi blocco selezionato">
        <button onclick="decomposeBlock()">Scomponi</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        // Parser a giunzioni esplicite
        function parseToBlocks(expr) {
            expr = expr.replace(/\s+/g, '');
            let blocks = [];
            let current = "";
            let balance = 0;
            let normalized = expr
        .replace(/\)\(/g, ')|(')
        .replace(/([a-zA-Z0-9])\(/g, '$1|(')
        .replace(/\)([a-zA-Z0-9])/g, ')|$1');

            for (let i = 0; i < expr.length; i++) {
                let char = expr[i];
                let isClosing = char === ')';
                let isOpening = char === '(';
                let isAlphaNum = /[a-zA-Z0-9^]/.test(char);

                // Punto di rottura: siamo fuori parentesi e c'è una giunzione
                if (balance === 0 && current !== "" && (isOpening || (isAlphaNum && expr[i-1] === ')'))) {
                    blocks.push(current);
                    current = "";
                }

                if (isOpening) balance++;
                else if (isClosing) balance--;
                current += char;
            }
            if (current) blocks.push(current);
            return blocks;
        }

        function areEquivalent(e1, e2) {
    try {
        // Funzione per trasformare la notazione algebrica umana in notazione JavaScript
        const prepare = (str) => {
            return str
                .replace(/\)\(/g, ')*(') // Trasforma )( in )*(
                .replace(/([a-zA-Z0-9])\(/g, '$1*(') // Trasforma x( in x*(
                .replace(/\)([a-zA-Z0-9])/g, ')*$1') // Trasforma )x in )*x
                .replace(/\^/g, '**'); // Trasforma ^ in ** per JS
        };

        const vars = [...new Set((e1 + e2).match(/[a-z]/gi))];
        const p1 = prepare(e1);
        const p2 = prepare(e2);

        for (let i = 0; i < 3; i++) {
            let scope = {};
            vars.forEach(v => scope[v] = Math.random() * 5 + 1);
            
            const ev = (expr) => {
                let s = expr;
                vars.forEach(v => s = s.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                return eval(s);
            };

            if (Math.abs(ev(p1) - ev(p2)) > 0.001) return false;
        }
        return true;
    } catch(e) { 
        console.error("Errore di calcolo:", e);
        return false; 
    }
}

        function addBlock(container, content) {
            let div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
            div.dataset.content = content;
            div.onclick = function() {
                if (this.classList.contains('simplified')) return;
                this.classList.toggle('selected');
                if (this.classList.contains('selected')) selected.push(this);
                else selected = selected.filter(el => el !== this);
                
                if (selected.length === 2) {
                    if (selected[0] !== selected[1]) simplify();
                    else { this.classList.remove('selected'); selected = []; }
                }
            };
            container.appendChild(div);
        }

        function simplify() {
    let [a, b] = selected;
    let c1 = a.dataset.content;
    let c2 = b.dataset.content;

    // 1. Funzione per estrarre la base e l'esponente da un blocco
    function getBaseAndExp(expr) {
        // Cerca un esponente finale (es: ^2). Se non c'è, l'esponente è 1.
        let match = expr.match(/^(.*?)(?:\^(\d+))?$/);
        let base = match[1];
        let exp = match[2] ? parseInt(match[2]) : 1;
        return { base, exp };
    }

    let obj1 = getBaseAndExp(c1);
    let obj2 = getBaseAndExp(c2);

    // 2. Controlliamo se le BASI sono equivalenti (così (x+1) e x+1 risultano uguali!)
    if (areEquivalent(obj1.base, obj2.base)) {
        
        // Troviamo l'esponente minore per sottrarlo a entrambi
        let minExp = Math.min(obj1.exp, obj2.exp);
        let newExp1 = obj1.exp - minExp;
        let newExp2 = obj2.exp - minExp;

        // Aggiorniamo il primo blocco
        if (newExp1 === 0) {
            a.classList.add('simplified');
        } else {
            // Se resta esponente 1, togliamo il ^, altrimenti lo rimettiamo
            let newContent = newExp1 === 1 ? obj1.base : `${obj1.base}^${newExp1}`;
            a.dataset.content = newContent;
            a.innerHTML = newContent.replace(/\^(\d+)/g, '<sup>$1</sup>');
        }

        // Aggiorniamo il secondo blocco
        if (newExp2 === 0) {
            b.classList.add('simplified');
        } else {
            let newContent = newExp2 === 1 ? obj2.base : `${obj2.base}^${newExp2}`;
            b.dataset.content = newContent;
            b.innerHTML = newContent.replace(/\^(\d+)/g, '<sup>$1</sup>');
        }

    } 
    // 3. Fallback: se non sono potenze ma interi blocchi equivalenti numericamente
    else if (areEquivalent(c1, c2)) {
        a.classList.add('simplified');
        b.classList.add('simplified');
    } else {
        alert("Non semplificabili!");
    }
    
    // Reset della selezione
    selected.forEach(el => el.classList.remove('selected'));
    selected = [];
}

        function decomposeBlock() {
            if (selected.length !== 1) return alert("Seleziona 1 blocco!");
            let target = selected[0];
            let input = document.getElementById('splitInput').value;
            if (areEquivalent(target.dataset.content, input)) {
                parseToBlocks(input).forEach(p => addBlock(target.parentElement, p));
                target.remove();
            } else {
                alert("Scomposizione errata!");
            }
            selected = [];
        }

        function generateFraction() {
            ['numerator', 'denominator'].forEach(id => {
                const container = document.getElementById(id);
                container.innerHTML = '';
                parseToBlocks(document.getElementById(id === 'numerator' ? 'numInput' : 'denInput').value)
                .forEach(p => addBlock(container, p));
            });
        }
    </script>
</body>
</html>
