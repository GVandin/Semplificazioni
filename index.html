<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>MathBoard Pro - Audio Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --accent: #4cc9f0;
            --danger: #f72585;
            --success: #2ec4b6;
            --bg: #f8f9fd;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body { 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 40px 20px; 
            background: linear-gradient(135deg, #e0e7ff 0%, #f8f9fd 100%);
            min-height: 100vh;
            margin: 0;
            color: #2b2d42;
        }

        h2 { font-weight: 600; color: var(--secondary); margin-bottom: 30px; letter-spacing: -1px; }

        .controls { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 650px; 
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .section-title {
            font-size: 0.9em;
            text-transform: uppercase;
            font-weight: 600;
            color: #8d99ae;
            margin-bottom: 15px;
            display: block;
        }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        
        input { 
            padding: 12px 18px; 
            border: 2px solid #edf2f4; 
            border-radius: 12px; 
            outline: none; 
            transition: 0.3s;
            font-size: 1em;
            flex: 1;
            min-width: 150px;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }

        button { 
            padding: 12px 25px; 
            cursor: pointer; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(67, 97, 238, 0.3);
        }

        button:hover { background: var(--secondary); transform: translateY(-2px); }

        .fraction-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 800px;
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .row { 
            display: flex; 
            gap: 12px; 
            min-height: 100px; 
            padding: 20px; 
            align-items: center; 
            flex-wrap: wrap; 
            width: 100%; 
            justify-content: center; 
        }

        .line { 
            width: 90%; 
            height: 6px; 
            background: #2b2d42; 
            margin: 15px 0; 
            border-radius: 10px;
            opacity: 0.8;
        }

        .block { 
            background: white;
            border: 2px solid #edf2f4;
            padding: 15px 22px; 
            border-radius: 16px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 1.4em; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            position: relative;
        }

        .block:hover { 
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .selected { 
            border-color: var(--primary); 
            background: #f0f3ff; 
            transform: scale(1.1) translateY(-5px); 
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.2);
            z-index: 10;
        }

        @keyframes successFlash {
            0% { transform: scale(1.1); border-color: var(--primary); }
            50% { transform: scale(1.2); border-color: var(--success); background: #e6fffa; color: var(--success); }
            100% { transform: scale(1); border-color: var(--success); }
        }
        .success-flash {
            animation: successFlash 0.5s ease-in-out;
            border-color: var(--success) !important;
            color: var(--success) !important;
            z-index: 15;
        }

        .simplified { 
            text-decoration: line-through; 
            opacity: 0.2; 
            pointer-events: none; 
            transform: scale(0.9);
            transition: 0.5s all;
        }

        sup { font-size: 0.6em; color: var(--secondary); }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            50% { transform: translateX(8px); }
            75% { transform: translateX(-8px); }
        }
        .error-flash {
            animation: errorShake 0.4s ease-in-out;
            border-color: var(--danger) !important;
            color: var(--danger) !important;
            background: #fff0f5 !important;
        }
    </style>
</head>
<body onclick="initAudio()">

    <h2>MathBoard Pro</h2>
    
    <div class="controls">
        <span class="section-title">1. Configura Frazione</span>
        <div class="input-group">
            <input type="text" id="numInput" placeholder="Numeratore (es: x^2-9)">
            <input type="text" id="denInput" placeholder="Denominatore (es: x+3)">
            
            <button onclick="caricaEsercizioCasuale()" style="background: var(--success); box-shadow: 0 4px 15px rgba(46, 196, 182, 0.3);" title="Carica esercizio pronto">🎲 Casuale</button>
            <button onclick="generateFraction()">Genera</button>
        </div>
    </div>

    <div class="controls">
        <span class="section-title">2. Scomposizione</span>
        <div class="input-group">
            <input type="text" id="splitInput" placeholder="Scrivi il risultato (es: (x-3)(x+3))">
            <button onclick="decomposeBlock()" style="background: var(--accent); box-shadow: 0 4px 15px rgba(76, 201, 240, 0.3);">Scomponi</button>
        </div>
    </div>

    <div class="fraction-card">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];
        let audioCtx = null;

        // --- LIBRERIA ESERCIZI ---
        const libreriaEsercizi = [
            { num: "x^2-9", den: "x-3" },                 // Differenza quadrati base
            { num: "x^2-4x+4", den: "x-2" },              // Quadrato di binomio
            { num: "a^2-b^2", den: "a+b" },               // Differenza quadrati lettere
            { num: "x^2+5x+6", den: "x+2" },              // Trinomio speciale
            { num: "2x+4", den: "x+2" },                  // Raccoglimento a fattore comune
            { num: "(x+1)^2-4", den: "x-1" },             // Differenza quadrati composta
            { num: "y^2-16", den: "y+4" }                 // Variazione variabile
        ];

        function caricaEsercizioCasuale() {
            initAudio(); // Assicura che l'audio parta anche se è il primo click
            const indiceCasuale = Math.floor(Math.random() * libreriaEsercizi.length);
            const esercizio = libreriaEsercizi[indiceCasuale];
            
            document.getElementById('numInput').value = esercizio.num;
            document.getElementById('denInput').value = esercizio.den;
            
            generateFraction();
            playSuccessSound(); // Feedback sonoro per indicare l'avvenuto caricamento
        }

        // --- MOTORE AUDIO ---
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSuccessSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            
            // Prima nota (Do4)
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(261.63, now);
            gain1.gain.setValueAtTime(0.2, now);
            gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc1.start(); osc1.stop(now + 0.2);

            // Seconda nota (Fa4 - Quarta ascendente)
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sine';
            osc2.frequency.setValueAtTime(349.23, now + 0.12);
            gain2.gain.setValueAtTime(0, now);
            gain2.gain.setValueAtTime(0.2, now + 0.12);
            gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc2.start(now + 0.12); osc2.stop(now + 0.4);
        }

        function playErrorSound() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth'; // Timbro più rauco
            osc.frequency.setValueAtTime(100, now); // Nota grave
            osc.frequency.exponentialRampToValueAtTime(60, now + 0.3); // Scivolamento verso il basso
            
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(now + 0.3);
        }

        // --- LOGICA ALGEBRICA ---
        function parseToBlocks(expr) {
            expr = expr.replace(/\s+/g, '').replace(/\*/g, '');
            if (!expr) return [];
            let blocks = [];
            let tempExpr = expr;
            let leadingMinus = false;
            if (tempExpr.startsWith('-')) {
                let rest = tempExpr.substring(1);
                let bal = 0, isRestPoly = false;
                for (let i = 0; i < rest.length; i++) {
                    if (rest[i] === '(') bal++;
                    if (rest[i] === ')') bal--;
                    if (bal === 0 && (rest[i] === '+' || (rest[i] === '-' && rest[i-1] !== '^'))) {
                        isRestPoly = true; break;
                    }
                }
                if (!isRestPoly) { leadingMinus = true; expr = rest; }
            }
            if (leadingMinus) blocks.push("-");
            let bal = 0, isPoly = false;
            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === '(') bal++;
                if (expr[i] === ')') bal--;
                if (bal === 0 && i > 0 && (expr[i] === '+' || (expr[i] === '-' && expr[i-1] !== '^'))) {
                    isPoly = true; break;
                }
            }
            if (isPoly) { blocks.push(expr); return blocks; }
            let start = 0; bal = 0;
            if (expr.length <= 1 && expr !== "") { blocks.push(expr); return blocks; }
            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === '(') bal++;
                if (expr[i] === ')') bal--;
                if (bal === 0 && i < expr.length - 1) {
                    let curr = expr[i], next = expr[i+1], split = false;
                    if (next === '^') split = false;
                    else if (curr === ')' || next === '(') split = true;
                    else if (/[0-9]/.test(curr) && /[a-zA-Z]/.test(next)) split = true;
                    else if (/[a-zA-Z]/.test(curr) && (/[a-zA-Z]/.test(next) || /[0-9]/.test(next))) split = true;
                    if (split) { blocks.push(expr.substring(start, i + 1)); start = i + 1; }
                }
            }
            if(expr !== "") blocks.push(expr.substring(start));
            return blocks;
        }

        function triggerErrorEffect(elements) {
            playErrorSound();
            elements.forEach(el => {
                el.classList.remove('selected');
                el.classList.add('error-flash');
                setTimeout(() => el.classList.remove('error-flash'), 800);
            });
            selected = [];
        }

        function areEquivalent(e1, e2) {
            if (!e1 || !e2) return false;
            try {
                const prepare = (str) => {
                    let s = "(" + str + ")";
                    s = s.replace(/(^|[\(\+\-\*\/])\s*-/g, '$1§').replace(/§/g, '(0-1)*');
                    return s.replace(/\^/g, '**').replace(/(\d)([a-zA-Z\(])/g, '$1*$2').replace(/([a-zA-Z\)])(\()/g, '$1*$2').replace(/(\))([a-zA-Z0-9])/g, '$1*$2');
                };
                let s = str.replace(/\s+/g, '');
                // Moltiplicazione implicita: 
                // 1. tra numero e lettera (es: 6y -> 6*y)
                // 2. tra parentesi e lettera/numero (es: y(x+6) -> y*(x+6))
                // 3. tra due lettere (es: xy -> x*y)
                s = s.replace(/([0-9a-zA-Z)])([a-zA-Z(])/g, '$1*$2');
                s = s.replace(/([a-zA-Z])([0-9])/g, '$1*$2');
                let p1 = prepare(e1), p2 = prepare(e2);
                let vars = [...new Set((e1 + e2).match(/[a-z]/gi) || [])];
                for (let i = 0; i < 3; i++) {
                    let scope = {};
                    vars.forEach(v => scope[v] = Math.random() * 5 + 2);
                    const ev = (expr) => {
                        let temp = expr;
                        vars.forEach(v => temp = temp.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                        return eval(temp);
                    };
                    if (Math.abs(ev(p1) - ev(p2)) > 0.01) return false;
                }
                return true;
            } catch(e) { return false; }
        }

        function finalizeSimplification(elements, callback) {
            playSuccessSound();
            elements.forEach(el => {
                el.classList.remove('selected');
                el.classList.add('success-flash');
            });

            setTimeout(() => {
                elements.forEach(el => {
                    el.classList.remove('success-flash');
                    el.classList.add('simplified');
                });
                if (callback) callback();
            }, 500);
        }

        function simplify() {
            const [a, b] = selected;
            let c1 = a.dataset.content, c2 = b.dataset.content;
            if (c1 === "-" && c2 === "-") {
                finalizeSimplification([a, b]);
                selected = []; return;
            }
            if (a.parentElement === b.parentElement) { triggerErrorEffect(selected); return; }
            let n1 = Number(c1), n2 = Number(c2);
            if (!isNaN(n1) && !isNaN(n2)) {
                let common = (function gcd(x,y){return y?gcd(y,x%y):x})(n1,n2);
                if (common > 1) {
                    let r1 = n1/common, r2 = n2/common;
                    finalizeSimplification([a, b], () => {
                        if (r1 !== 1) addBlock(a.parentElement, r1.toString());
                        if (r2 !== 1) addBlock(b.parentElement, r2.toString());
                    });
                    selected = []; return;
                }
            }
            let m1 = c1.match(/^(.*?)(?:\^(\d+))?$/), m2 = c2.match(/^(.*?)(?:\^(\d+))?$/);
            if (m1 && m2 && areEquivalent(m1[1], m2[1])) {
                let d = parseInt(m1[2]||1) - parseInt(m2[2]||1);
                finalizeSimplification([a, b], () => {
                    if (d > 0) addBlock(a.parentElement, d === 1 ? m1[1] : `${m1[1]}^${d}`);
                    else if (d < 0) addBlock(b.parentElement, Math.abs(d) === 1 ? m2[1] : `${m2[1]}^${Math.abs(d)}`);
                });
                selected = [];
            } else { triggerErrorEffect(selected); }
        }

        function generateFraction() {
            const nCont = document.getElementById('numerator'), dCont = document.getElementById('denominator');
            nCont.innerHTML = ''; dCont.innerHTML = '';
            parseToBlocks(document.getElementById('numInput').value).forEach(b => addBlock(nCont, b));
            parseToBlocks(document.getElementById('denInput').value).forEach(b => addBlock(dCont, b));
        }

        function addBlock(container, content) {
            let div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
            div.dataset.content = content;
            div.onclick = function(e) {
                initAudio(); // Garantisce l'attivazione audio
                if (this.classList.contains('simplified') || this.classList.contains('error-flash') || this.classList.contains('success-flash')) return;
                this.classList.toggle('selected');
                if (this.classList.contains('selected')) selected.push(this);
                else selected = selected.filter(el => el !== this);
                if (selected.length === 2) simplify();
            };
            container.appendChild(div);
        }

        function decomposeBlock() {
            if (selected.length !== 1) { if(selected.length > 1) triggerErrorEffect(selected); return; }
            let target = selected[0], formula = document.getElementById('splitInput').value;
            if (!formula) return;
            if (areEquivalent(target.dataset.content, formula)) {
                playSuccessSound();
                target.classList.add('success-flash');
                setTimeout(() => {
                    parseToBlocks(formula).forEach(p => addBlock(target.parentElement, p));
                    target.remove();
                    document.getElementById('splitInput').value = '';
                    selected = [];
                }, 400);
            } else { triggerErrorEffect([target]); }
        }
    </script>
</body>
</html>
