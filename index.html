<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 10px; min-height: 80px; padding: 10px; align-items: center; }
        .line { width: 300px; height: 4px; background: #333; margin: 10px 0; }
        .block { 
            border: 3px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; 
            background: #fff; font-weight: bold; font-size: 1.5em; transition: 0.2s;
        }
        .selected { border: 4px solid #007bff; background: #e7f1ff; }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="es: (x+1)*(x-1)">
        <input type="text" id="denInput" placeholder="es: (x-1)*5">
        <button onclick="generateFraction()">Genera</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        function generateFraction() {
            createBlocks('numerator', document.getElementById('numInput').value);
            createBlocks('denominator', document.getElementById('denInput').value);
        }

        function createBlocks(containerId, expression) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            const blocks = expression.split('*');
            
            blocks.forEach(part => {
                const div = document.createElement('div');
                div.className = 'block';
                div.innerHTML = part.replace(/\^(\d+)/g, '<sup>$1</sup>');
                div.dataset.val = part.trim();
                div.onclick = function() { toggleSelect(this); };
                container.appendChild(div);
            });
        }

        function toggleSelect(el) {
            if (el.classList.contains('simplified')) return;
            el.classList.toggle('selected');
            if (el.classList.contains('selected')) { selected.push(el); } 
            else { selected = selected.filter(item => item !== el); }
            if (selected.length === 2) simplify();
        }

        function simplify() {
            const [a, b] = selected;
            if (a.parentElement !== b.parentElement && a.dataset.val === b.dataset.val) {
                a.classList.add('simplified'); b.classList.add('simplified');
                a.classList.remove('selected'); b.classList.remove('selected');
            } else {
                alert("Puoi semplificare solo blocchi identici!");
                selected.forEach(el => el.classList.remove('selected'));
            }
            selected = [];
        }
    </script>
</body>
</html>
