<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica - Parser Gerarchico</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 15px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; }
        .line { width: 400px; height: 4px; background: #333; margin: 10px 0; }
        .block { border: 3px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; font-size: 1.6em; }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>
    <h2>Lavagna Algebrica - Parser Gerarchico</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="Num (es: 3x(2x+3))">
        <input type="text" id="denInput" placeholder="Den (es: 3)">
        <button onclick="generateFraction()">Genera</button>
    </div>
    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>
    <script>
        let selected = [];

        function parseToBlocks(expression) {
            let blocks = [];
            let current = "";
            let balance = 0;
            expression = expression.replace(/\*/g, '');
            for (let i = 0; i < expression.length; i++) {
                let char = expression[i];
                current += char;
                if (char === '(') balance++;
                if (char === ')') balance--;
                // Rottura gerarchica: solo se siamo fuori parentesi e il prox char non è + o -
                if (balance === 0 && i < expression.length - 1) {
                    let next = expression[i+1];
                    if (next !== '+' && next !== '-') {
                        blocks.push(current);
                        current = "";
                    }
                }
            }
            if (current) blocks.push(current);
            return blocks;
        }

        function parseBlock(input) {
            const match = input.match(/(.+)\^(\d+)/);
            return match ? { base: match[1], exp: parseInt(match[2]) } : { base: input, exp: 1 };
        }

        function addBlock(container, content) {
            const data = parseBlock(content);
            const div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = `${data.base}${data.exp > 1 ? '<sup>'+data.exp+'</sup>' : ''}`;
            div.dataset.base = data.base;
            div.dataset.exp = data.exp;
            div.onclick = function() { el.classList.toggle('selected'); selected.push(el); };
            container.appendChild(div);
        }

        // ... (il resto delle funzioni rimane invariato)
        function generateFraction() {
            ['numerator', 'denominator'].forEach(id => {
                const container = document.getElementById(id);
                container.innerHTML = '';
                parseToBlocks(document.getElementById(id === 'numerator' ? 'numInput' : 'denInput').value)
                .forEach(part => { if(part.trim()) addBlock(container, part.trim()); });
            });
        }
    </script>
</body>
</html>
