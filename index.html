<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica Interattiva</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f4f4f9; }
        .controls { margin-bottom: 20px; }
        .fraction { display: flex; flex-direction: column; align-items: center; border: 3px solid #333; padding: 20px; border-radius: 10px; background: white; }
        .row { display: flex; gap: 10px; min-height: 60px; padding: 10px; align-items: center; }
        .line { width: 100%; height: 4px; background: #333; margin: 5px 0; }
        .block { 
            border: 2px solid #555; padding: 15px; border-radius: 8px; 
            cursor: pointer; background: #fff; font-weight: bold; font-size: 1.2em;
            transition: 0.2s; user-select: none;
        }
        .selected { border: 4px solid #007bff; background: #e7f1ff; }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="Numeratore (es: 2x+x)">
        <input type="text" id="denInput" placeholder="Denominatore (es: x+1)">
        <button onclick="generateFraction()">Genera Frazione</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        function generateFraction() {
            createBlocks('numerator', document.getElementById('numInput').value);
            createBlocks('denominator', document.getElementById('denInput').value);
        }

        function createBlocks(containerId, expression) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            // Divide per + o -, mantenendo il separatore (regex)
            const parts = expression.split(/([+-])/).filter(p => p !== "");
            
            parts.forEach(part => {
                const div = document.createElement('div');
                div.className = 'block';
                div.innerText = part;
                div.dataset.val = part;
                div.onclick = function() { toggleSelect(this); };
                container.appendChild(div);
            });
        }

        function toggleSelect(el) {
            if (el.classList.contains('simplified')) return;
            el.classList.toggle('selected');
            
            if (el.classList.contains('selected')) {
                selected.push(el);
            } else {
                selected = selected.filter(item => item !== el);
            }

            if (selected.length === 2) {
                simplify();
            }
        }

        function simplify() {
            const [a, b] = selected;
            if (a.parentElement !== b.parentElement && a.dataset.val === b.dataset.val) {
                a.classList.add('simplified');
                b.classList.add('simplified');
                a.classList.remove('selected');
                b.classList.remove('selected');
            } else {
                alert("Non puoi semplificare termini diversi o nella stessa riga!");
                selected.forEach(el => el.classList.remove('selected'));
            }
            selected = [];
        }
    </script>
</body>
</html>
