<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica - Blocchi Unici</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 20px; min-height: 80px; padding: 20px; align-items: center; }
        .line { width: 300px; height: 4px; background: #333; margin: 10px 0; }
        .block { 
            border: 3px solid #333; padding: 20px; border-radius: 12px; 
            cursor: pointer; background: #fff; font-weight: bold; font-size: 1.5em;
            transition: 0.3s; user-select: none;
        }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
    </style>
</head>
<body>

    <h2>Inserisci le espressioni (Blocchi Unici)</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="es: 2x+x">
        <input type="text" id="denInput" placeholder="es: x+1">
        <button onclick="generateFraction()">Genera Frazione</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        function generateFraction() {
            createBlock('numerator', document.getElementById('numInput').value);
            createBlock('denominator', document.getElementById('denInput').value);
        }

        function createBlock(containerId, expression) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            
            // Crea un unico blocco che contiene l'intera espressione
            const div = document.createElement('div');
            div.className = 'block';
            div.innerText = expression;
            div.dataset.val = expression; // Il valore è l'intera stringa
            div.onclick = function() { toggleSelect(this); };
            container.appendChild(div);
        }

        function toggleSelect(el) {
            if (el.classList.contains('simplified')) return;
            el.classList.toggle('selected');
            
            if (el.classList.contains('selected')) {
                selected.push(el);
            } else {
                selected = selected.filter(item => item !== el);
            }

            if (selected.length === 2) {
                simplify();
            }
        }

        function simplify() {
            const [a, b] = selected;
            // Verifica che siano in righe diverse e che il contenuto sia identico
            if (a.parentElement !== b.parentElement && a.dataset.val === b.dataset.val) {
                a.classList.add('simplified');
                b.classList.add('simplified');
                a.classList.remove('selected');
                b.classList.remove('selected');
            } else {
                alert("Puoi semplificare solo blocchi identici (uno sopra e uno sotto)!");
                selected.forEach(el => el.classList.remove('selected'));
            }
            selected = [];
        }
    </script>
</body>
</html>
