<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica - Logica Robusta</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 15px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; }
        .line { width: 400px; height: 4px; background: #333; margin: 10px 0; }
        .block { border: 3px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; font-size: 1.6em; transition: 0.2s; }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica - Logica Robusta</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="Numeratore (es: 3x^2(x+3))">
        <input type="text" id="denInput" placeholder="Denominatore (es: x(3+x))">
        <button onclick="generateFraction()">Genera</button>
    </div>
    <div class="controls">
        <input type="text" id="splitInput" placeholder="Scomponi blocco">
        <button onclick="decomposeBlock()">Verifica e Scomponi</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

   function parseToBlocks(expr) {
    let blocks = [];
    let current = "";
    let balance = 0;
    
    // Rimuoviamo gli spazi
    expr = expr.replace(/\s+/g, '');
    
    for (let i = 0; i < expr.length; i++) {
        let char = expr[i];
        
        if (char === '(') balance++;
        if (char === ')') balance--;
        
        current += char;
        
        // La logica di rottura:
        // Spezziamo solo se siamo a "livello 0" (fuori parentesi) 
        // e incontriamo una moltiplicazione implicita o esplicita 
        // che NON è preceduta o seguita da + o -
        
        if (balance === 0) {
            let next = expr[i + 1];
            
            // Regola: Spezziamo tra due fattori (es: x e (x+3))
            // MA solo se non siamo dentro un polinomio (es: x+3 non si spezza)
            let isMonomialBoundary = (
                (/[a-zA-Z0-9]/.test(char) && next === '(') || // x(
                (char === ')' && /[a-zA-Z0-9]/.test(next)) || // )( o )x
                (char === ')' && next === '(')                // )(
            );

            // ECCEZIONE DI PROTEZIONE:
            // Non spezzare mai se il blocco che stiamo formando contiene + o -
            if (/[+\-]/.test(current)) {
                // Se contiene + o -, non spezziamo mai fino alla fine
                continue; 
            }

            if (isMonomialBoundary) {
                blocks.push(current);
                current = "";
            }
        }
    }
    if (current) blocks.push(current);
    return blocks.filter(b => b.trim() !== "");
}

    // Verifica equivalenza con 3 punti casuali
    function areEquivalent(expr1, expr2) {
        try {
            const vars = [...new Set((expr1 + expr2).match(/[a-z]/g))];
            for (let i = 0; i < 3; i++) {
                let scope = {};
                vars.forEach(v => scope[v] = Math.random() * 5 + 1);
                const evalE = (e) => {
                    let str = e.replace(/\^/g, '**');
                    vars.forEach(v => str = str.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                    return eval(str);
                };
                if (Math.abs(evalE(expr1) - evalE(expr2)) > 0.001) return false;
            }
            return true;
        } catch(e) { return false; }
    }

    // Gestione semplificazione con esponenti
    function simplify() {
        let [a, b] = selected;
        let contentA = a.dataset.content;
        let contentB = b.dataset.content;

        // Estrazione base ed esponente: gestisce tutto ciò che precede ^n
        const getBaseExp = (str) => {
            let match = str.match(/(.+)\^(\d+)$/);
            return match ? { base: match[1], exp: parseInt(match[2]) } : { base: str, exp: 1 };
        };

        let dataA = getBaseExp(contentA);
        let dataB = getBaseExp(contentB);

        // Se le basi sono identiche (anche se sono parentesi complesse), sottrai esponenti
        if (dataA.base === dataB.base) {
            let diff = dataA.exp - dataB.exp;
            a.classList.add('simplified');
            b.classList.add('simplified');

            if (diff > 0) {
                let res = diff === 1 ? dataA.base : `${dataA.base}^${diff}`;
                addBlock(a.parentElement, res);
            } else if (diff < 0) {
                let res = Math.abs(diff) === 1 ? dataB.base : `${dataB.base}^${Math.abs(diff)}`;
                addBlock(b.parentElement, res);
            }
        } else if (areEquivalent(contentA, contentB)) {
            a.classList.add('simplified');
            b.classList.add('simplified');
        } else {
            alert("Semplificazione non valida!");
        }
        selected.forEach(el => el.classList.remove('selected'));
        selected = [];
    }

    // Gestione selezione intelligente
        function addBlock(container, content) {
            const div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
            div.dataset.content = content;
            
            div.onclick = function(e) {
                if (this.classList.contains('simplified')) return;
                
                // Toggle selezione
                this.classList.toggle('selected');
                
                if (this.classList.contains('selected')) {
                    selected.push(this);
                } else {
                    selected = selected.filter(el => el !== this);
                }

                // Esegui semplificazione solo se sono 2 blocchi DIVERSI
                if (selected.length === 2) {
                    if (selected[0] !== selected[1]) {
                        simplify();
                    } else {
                        // Se clicca lo stesso blocco due volte, deseleziona tutto
                        this.classList.remove('selected');
                        selected = [];
                    }
                }
            };
            container.appendChild(div);
        }

    // Scomposizione corretta
        function decomposeBlock() {
            if (selected.length !== 1) return alert("Seleziona esattamente un blocco!");
            let target = selected[0];
            let input = document.getElementById('splitInput').value;
            
            // Verifica matematica: il blocco originale deve essere equivalente alla scomposizione
            if (areEquivalent(target.dataset.content, input)) {
                // Scomponiamo l'input inserito dall'utente in fattori
                // Usiamo un piccolo trick: rimuoviamo le parentesi esterne se presenti
                let cleanInput = input.replace(/^\((.*)\)$/, '$1');
                
                // Questa funzione divide (x+3)(x-3) in [x+3, x-3]
                let parts = cleanInput.match(/\([^\)]+\)|[a-zA-Z0-9^]+/g);
                
                parts.forEach(p => addBlock(target.parentElement, p));
                target.remove();
            } else {
                alert("Errore: la scomposizione non è equivalente al blocco selezionato!");
            }
            // Reset
            selected.forEach(el => el.classList.remove('selected'));
            selected = [];
            document.getElementById('splitInput').value = '';
        }

    function generateFraction() {
        ['numerator', 'denominator'].forEach(id => {
            const container = document.getElementById(id);
            container.innerHTML = '';
            parseToBlocks(document.getElementById(id === 'numerator' ? 'numInput' : 'denInput').value)
            .forEach(p => addBlock(container, p));
        });
    }
    </script>
</body>
</html>
