<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica - Tutor Intelligente</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; margin-top: 20px; }
        .row { display: flex; gap: 15px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; }
        .line { width: 400px; height: 4px; background: #333; margin: 10px 0; }
        .block { 
            border: 3px solid #333; padding: 15px; border-radius: 8px; cursor: pointer; 
            background: #fff; font-weight: bold; font-size: 1.6em; transition: 0.2s;
        }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica - Tutor Intelligente</h2>
    
    <div class="controls">
        <input type="text" id="numInput" placeholder="Numeratore (es: x^2-1)">
        <input type="text" id="denInput" placeholder="Denominatore (es: x-1)">
        <button onclick="generateFraction()">Genera Frazione</button>
    </div>

    <div class="controls">
        <input type="text" id="splitInput" placeholder="Scomponi in (es: (x-1)(x+1))">
        <button onclick="decomposeBlock()">Verifica e Scomponi</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        // Motore di verifica basato su 5 punti casuali per evitare coincidenze
        function areEquivalent(expr1, expr2) {
            try {
                let randomValues = [];
                while(randomValues.length < 5) {
                    let r = Math.floor(Math.random() * 20) - 10;
                    if(!randomValues.includes(r)) randomValues.push(r);
                }
                return randomValues.every(val => {
                    const evalExpr = (e) => eval(e.replace(/\^/g, '**').replace(/x/g, `(${val})`));
                    return Math.abs(evalExpr(expr1) - evalExpr(expr2)) < 0.001;
                });
            } catch(e) { return false; }
        }

        function parseBlock(input) {
            const match = input.match(/(.+)\^(\d+)/);
            return match ? { base: match[1], exp: parseInt(match[2]) } : { base: input, exp: 1 };
        }

        function addBlock(container, content) {
            const data = parseBlock(content);
            const div = document.createElement('div');
            div.className = 'block';
            
            // Logica: mostra l'esponente solo se > 1
            const exponentDisplay = data.exp > 1 ? `<sup>${data.exp}</sup>` : "";
            div.innerHTML = `${data.base}${exponentDisplay}`;
            
            div.dataset.base = data.base;
            div.dataset.exp = data.exp;
            div.onclick = function() { toggleSelect(this); };
            container.appendChild(div);
        }

        function generateFraction() {
            ['numerator', 'denominator'].forEach(id => {
                const container = document.getElementById(id);
                container.innerHTML = '';
                const val = document.getElementById(id === 'numerator' ? 'numInput' : 'denInput').value;
                const regex = /(?=\()(?<=\))|(?<=\))(?=[a-zA-Z0-9])|(?<=[a-zA-Z0-9])(?=\()/g;
                val.replace(/\*/g, '').split(regex).forEach(part => {
                    if(part.trim()) addBlock(container, part.trim());
                });
            });
        }

        function toggleSelect(el) {
            el.classList.toggle('selected');
            if (el.classList.contains('selected')) selected.push(el);
            else selected = selected.filter(i => i !== el);
            if (selected.length === 2) simplify();
        }

        function simplify() {
            let [a, b] = selected;
            if (a.parentElement !== b.parentElement && a.dataset.base === b.dataset.base) {
                let expA = parseInt(a.dataset.exp);
                let expB = parseInt(b.dataset.exp);
                
                if (expA === expB) { 
                    a.classList.add('simplified'); b.classList.add('simplified'); 
                } else if (expA > expB) { 
                    b.classList.add('simplified');
                    a.dataset.exp = expA - expB;
                    a.innerHTML = `${a.dataset.base}${a.dataset.exp > 1 ? '<sup>'+a.dataset.exp+'</sup>' : ''}`;
                } else {
                    a.classList.add('simplified');
                    b.dataset.exp = expB - expA;
                    b.innerHTML = `${b.dataset.base}${b.dataset.exp > 1 ? '<sup>'+b.dataset.exp+'</sup>' : ''}`;
                }
            } else { alert("Semplificazione non valida!"); }
            selected.forEach(el => el.classList.remove('selected'));
            selected = [];
        }

        function decomposeBlock() {
            const input = document.getElementById('splitInput').value;
            if (selected.length !== 1) { alert("Seleziona un blocco!"); return; }
            const target = selected[0];
            const originalExpr = target.dataset.base + (target.dataset.exp > 1 ? '^'+target.dataset.exp : '');
            
            if (!areEquivalent(originalExpr, input)) {
                alert("Errore: La scomposizione non è equivalente!");
                return;
            }

            const parent = target.parentElement;
            const regex = /(?=\()(?<=\))|(?<=\))(?=[a-zA-Z0-9])|(?<=[a-zA-Z0-9])(?=\()/g;
            input.replace(/\*/g, '').split(regex).forEach(part => {
                if(part.trim()) addBlock(parent, part.trim());
            });
            target.remove();
            selected = [];
            document.getElementById('splitInput').value = '';
        }
    </script>
</body>
</html>
