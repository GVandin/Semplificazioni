<script>
    let selected = [];

    function parseToBlocks(expr) {
        expr = expr.replace(/\s+/g, '');
        let blocks = [];
        let current = "";
        let balance = 0;

        for (let i = 0; i < expr.length; i++) {
            let char = expr[i];
            
            // Logica: se siamo fuori da ogni parentesi (balance 0)
            // e incontriamo l'inizio di un blocco moltiplicativo, spezziamo.
            if (balance === 0 && current !== "" && (char === '(' || /[a-zA-Z0-9]/.test(char))) {
                // Regola: Spezza solo se il carattere precedente era una chiusura di parentesi ')'
                // oppure se è un monomio che precede una parentesi.
                if (expr[i-1] === ')' || char === '(') {
                    blocks.push(current);
                    current = "";
                }
            }

            if (char === '(') balance++;
            else if (char === ')') balance--;
            current += char;
        }
        if (current) blocks.push(current);
        return blocks;
    }

    // ... (Mantieni le funzioni areEquivalent, addBlock, simplify, decomposeBlock, generateFraction come prima)
</script>
