<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica Pro</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; width: 100%; }
        .row { display: flex; gap: 8px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; border: 1px dashed #999; width: 100%; justify-content: center; }
        .line { width: 100%; max-width: 500px; height: 4px; background: #333; margin: 10px 0; }
        .block { border: 3px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; font-size: 1.5em; transition: 0.2s; user-select: none; position: relative; }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
        sup { font-size: 0.6em; vertical-align: super; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; margin-right: 5px; }
        button { padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }

        /* --- EFFETTO LAMPEGGIO ROSSO --- */
        @keyframes errorShake {
            0%, 100% { border-color: #333; transform: translateX(0); }
            25% { border-color: #dc3545; transform: translateX(-5px); background: #f8d7da; }
            50% { border-color: #dc3545; transform: translateX(5px); }
            75% { border-color: #dc3545; transform: translateX(-5px); }
        }
        .error-flash {
            animation: errorShake 0.3s ease-in-out 2;
            border-color: #dc3545 !important;
            color: #dc3545 !important;
        }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica</h2>
    
    <div class="controls">
        <strong>1. Inserisci Frazione:</strong><br><br>
        <input type="text" id="numInput" placeholder="Numeratore (es: x^2-9)">
        <input type="text" id="denInput" placeholder="Denominatore (es: x+3)">
        <button onclick="generateFraction()">Genera</button>
    </div>

    <div class="controls">
        <strong>2. Azioni:</strong> (Seleziona un blocco per scomporlo)<br><br>
        <input type="text" id="splitInput" placeholder="Scrivi scomposizione...">
        <button onclick="decomposeBlock()">Scomponi</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        // --- MOTORE DI PARSING ---
        function parseToBlocks(expr) {
            expr = expr.replace(/\s+/g, '').replace(/\*/g, '');
            if (!expr) return [];

            let blocks = [];
            
            // Gestione segno meno iniziale (solo se non è un polinomio)
            let tempExpr = expr;
            let leadingMinus = false;
            if (tempExpr.startsWith('-')) {
                let rest = tempExpr.substring(1);
                let bal = 0, isRestPoly = false;
                for (let i = 0; i < rest.length; i++) {
                    if (rest[i] === '(') bal++;
                    if (rest[i] === ')') bal--;
                    if (bal === 0 && (rest[i] === '+' || (rest[i] === '-' && rest[i-1] !== '^'))) {
                        isRestPoly = true; break;
                    }
                }
                if (!isRestPoly) { leadingMinus = true; expr = rest; }
            }
            if (leadingMinus) blocks.push("-");

            // Controllo Polinomio
            let bal = 0, isPoly = false;
            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === '(') bal++;
                if (expr[i] === ')') bal--;
                if (bal === 0 && i > 0 && (expr[i] === '+' || (expr[i] === '-' && expr[i-1] !== '^'))) {
                    isPoly = true; break;
                }
            }
            if (isPoly) { blocks.push(expr); return blocks; }

            // Divisione in fattori
            let start = 0; bal = 0;
            if (expr.length <= 1 && expr !== "") { blocks.push(expr); return blocks; }

            for (let i = 0; i < expr.length; i++) {
                if (expr[i] === '(') bal++;
                if (expr[i] === ')') bal--;
                if (bal === 0 && i < expr.length - 1) {
                    let curr = expr[i], next = expr[i+1], split = false;
                    if (next === '^') split = false;
                    else if (curr === ')' || next === '(') split = true;
                    else if (/[0-9]/.test(curr) && /[a-zA-Z]/.test(next)) split = true;
                    else if (/[a-zA-Z]/.test(curr) && (/[a-zA-Z]/.test(next) || /[0-9]/.test(next))) split = true;
                    if (split) { blocks.push(expr.substring(start, i + 1)); start = i + 1; }
                }
            }
            if(expr !== "") blocks.push(expr.substring(start));
            return blocks;
        }

        // --- FEEDBACK GRAFICO ERRORI ---
        function triggerErrorEffect(elements) {
            elements.forEach(el => {
                el.classList.remove('selected');
                el.classList.add('error-flash');
                setTimeout(() => el.classList.remove('error-flash'), 800);
            });
            selected = [];
        }

        // --- VERIFICA EQUIVALENZA (Fix Bug Loop Infinito) ---
        function areEquivalent(e1, e2) {
            if (!e1 || !e2) return false;
            try {
                const prepare = (str) => {
                    let s = "(" + str + ")";
                    // Trasformazione sicura dei meno unari senza loop infinito
                    s = s.replace(/(^|[\(\+\-\*\/])\s*-/g, '$1§'); 
                    s = s.replace(/§/g, '(0-1)*');
                    
                    return s.replace(/\^/g, '**')
                            .replace(/(\d)([a-zA-Z\(])/g, '$1*$2')
                            .replace(/([a-zA-Z\)])(\()/g, '$1*$2')
                            .replace(/(\))([a-zA-Z0-9])/g, '$1*$2');
                };
                
                let p1 = prepare(e1), p2 = prepare(e2);
                let vars = [...new Set((e1 + e2).match(/[a-z]/gi) || [])];
                for (let i = 0; i < 3; i++) {
                    let scope = {};
                    vars.forEach(v => scope[v] = Math.random() * 5 + 2);
                    const ev = (expr) => {
                        let temp = expr;
                        vars.forEach(v => temp = temp.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                        return eval(temp);
                    };
                    if (Math.abs(ev(p1) - ev(p2)) > 0.01) return false;
                }
                return true;
            } catch(e) { return false; }
        }

        function getGCD(a, b) {
            a = Math.abs(a); b = Math.abs(b);
            while (b) { a %= b; [a, b] = [b, a]; }
            return a;
        }

        // --- SEMPLIFICAZIONE ---
        function simplify() {
            const [a, b] = selected;
            let c1 = a.dataset.content, c2 = b.dataset.content;

            // Semplificazione Segni Meno (Bug 1 risolto)
            if (c1 === "-" && c2 === "-") {
                a.classList.add('simplified');
                b.classList.add('simplified');
                a.classList.remove('selected');
                b.classList.remove('selected');
                selected = [];
                return;
            }

            // Controllo Posizione
            if (a.parentElement === b.parentElement) {
                triggerErrorEffect(selected);
                return;
            }

            // Numeri
            let n1 = Number(c1), n2 = Number(c2);
            if (!isNaN(n1) && !isNaN(n2)) {
                let common = getGCD(n1, n2);
                if (common > 1) {
                    a.classList.add('simplified'); b.classList.add('simplified');
                    let r1 = n1/common, r2 = n2/common;
                    if (r1 !== 1) addBlock(a.parentElement, r1.toString());
                    if (r2 !== 1) addBlock(b.parentElement, r2.toString());
                    selected = []; return;
                }
            }

            // Algebrica
            let m1 = c1.match(/^(.*?)(?:\^(\d+))?$/), m2 = c2.match(/^(.*?)(?:\^(\d+))?$/);
            if (m1 && m2 && areEquivalent(m1[1], m2[1])) {
                a.classList.add('simplified'); b.classList.add('simplified');
                let d = parseInt(m1[2]||1) - parseInt(m2[2]||1);
                if (d > 0) addBlock(a.parentElement, d === 1 ? m1[1] : `${m1[1]}^${d}`);
                else if (d < 0) addBlock(b.parentElement, Math.abs(d) === 1 ? m2[1] : `${m2[1]}^${Math.abs(d)}`);
                selected = [];
            } else {
                triggerErrorEffect(selected);
            }
        }

        // --- INTERFACCIA ---
        function generateFraction() {
            const nCont = document.getElementById('numerator'), dCont = document.getElementById('denominator');
            nCont.innerHTML = ''; dCont.innerHTML = '';
            parseToBlocks(document.getElementById('numInput').value).forEach(b => addBlock(nCont, b));
            parseToBlocks(document.getElementById('denInput').value).forEach(b => addBlock(dCont, b));
        }

        function addBlock(container, content) {
            let div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
            div.dataset.content = content;
            div.onclick = function() {
                if (this.classList.contains('simplified') || this.classList.contains('error-flash')) return;
                this.classList.toggle('selected');
                if (this.classList.contains('selected')) selected.push(this);
                else selected = selected.filter(el => el !== this);
                if (selected.length === 2) simplify();
            };
            container.appendChild(div);
        }

        function decomposeBlock() {
            if (selected.length !== 1) { if(selected.length > 1) triggerErrorEffect(selected); return; }
            let target = selected[0], formula = document.getElementById('splitInput').value;
            if (!formula) return;

            if (areEquivalent(target.dataset.content, formula)) {
                parseToBlocks(formula).forEach(p => addBlock(target.parentElement, p));
                target.remove();
                document.getElementById('splitInput').value = '';
                selected = [];
            } else {
                triggerErrorEffect([target]);
            }
        }
    </script>
</body>
</html>
