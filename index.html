<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Lavagna Algebrica</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f2f5; }
        .controls { margin-bottom: 10px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .fraction { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .row { display: flex; gap: 8px; min-height: 90px; padding: 15px; align-items: center; flex-wrap: wrap; border: 1px dashed #999; }
        .line { width: 400px; height: 4px; background: #333; margin: 10px 0; }
        .block { border: 3px solid #333; padding: 12px; border-radius: 8px; cursor: pointer; background: #fff; font-weight: bold; font-size: 1.5em; transition: 0.2s; }
        .selected { border: 4px solid #007bff; background: #e7f1ff; transform: scale(1.05); }
        .simplified { text-decoration: line-through; opacity: 0.3; pointer-events: none; }
        sup { font-size: 0.6em; vertical-align: super; }
    </style>
</head>
<body>

    <h2>Lavagna Algebrica</h2>
    <div class="controls">
        <input type="text" id="numInput" placeholder="Numeratore">
        <input type="text" id="denInput" placeholder="Denominatore">
        <button onclick="generateFraction()">Genera</button>
    </div>
    <div class="controls">
        <input type="text" id="splitInput" placeholder="Scomponi blocco selezionato">
        <button onclick="decomposeBlock()">Scomponi</button>
    </div>

    <div class="fraction">
        <div id="numerator" class="row"></div>
        <div class="line"></div>
        <div id="denominator" class="row"></div>
    </div>

    <script>
        let selected = [];

        // Parser a giunzioni esplicite
       function parseToBlocks(expr) {
    expr = expr.replace(/\s+/g, '');
    if (!expr) return [];

    // 1. Controllo Polinomio: se c'è un + o - al livello principale, è un blocco UNICO.
    let balance = 0;
    let isPolynomial = false;
    // Partiamo da 1 per tollerare un eventuale segno meno all'inizio (es: -x^2)
    for (let i = 1; i < expr.length; i++) {
        if (expr[i] === '(') balance++;
        else if (expr[i] === ')') balance--;
        
        if (balance === 0 && (expr[i] === '+' || expr[i] === '-')) {
            isPolynomial = true;
            break;
        }
    }

    // Se è un polinomio (es. x^2-9), restituisci l'intero blocco intatto!
    if (isPolynomial) return [expr];

    // 2. Se è una moltiplicazione, estraiamo i singoli fattori
    let blocks = [];
    let current = "";
    balance = 0;

    for (let i = 0; i < expr.length; i++) {
        let char = expr[i];
        
        if (char === '(') balance++;
        else if (char === ')') balance--;
        
        current += char;

        // Condizione di taglio: siamo a livello 0 (fuori parentesi) e non siamo all'ultimo carattere
        if (balance === 0 && i < expr.length - 1) {
            let nextChar = expr[i + 1];
            let lastChar = current[current.length - 1];

            // Tagliamo SOLO SE il prossimo carattere NON è un esponente (^)
            // E siamo al confine di una parentesi (es: "...)" oppure il prossimo è "(" )
            if (nextChar !== '^' && (lastChar === ')' || nextChar === '(')) {
                blocks.push(current);
                current = "";
            }
        }
    }
    if (current) blocks.push(current);
    return blocks;
}

      function areEquivalent(e1, e2) {
    if (!e1 || !e2) return false;
    try {
        const prepare = (str) => {
            // Applichiamo la tua idea: ogni blocco è trattato come se fosse tra parentesi
            let wrapped = "(" + str + ")";
            return wrapped
                .replace(/\^/g, '**')
                .replace(/\)\(/g, ')*(')
                .replace(/([a-zA-Z0-9])\(/g, '$1*(')
                .replace(/\)([a-zA-Z0-9])/g, ')*$1');
        };

        const p1 = prepare(e1);
        const p2 = prepare(e2);
        
        // Estraiamo le variabili (es: x, y, a)
        const vars = [...new Set((e1 + e2).match(/[a-z]/gi) || [])];

        // Test numerico su 3 campioni casuali
        for (let i = 0; i < 3; i++) {
            let scope = {};
            vars.forEach(v => scope[v] = Math.random() * 5 + 1);
            
            const ev = (expr) => {
                let s = expr;
                vars.forEach(v => s = s.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                return eval(s);
            };

            if (Math.abs(ev(p1) - ev(p2)) > 0.1) return false;
        }
        return true;
    } catch(e) {
        return false;
    }
}

        function addBlock(container, content) {
    let div = document.createElement('div');
    div.className = 'block';
    div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
    div.dataset.content = content;

    div.onclick = function() {
        // Se è già semplificato, non fare nulla
        if (this.classList.contains('simplified')) return;

        // Caso 1: Il blocco è già selezionato -> lo deselezioniamo
        if (this.classList.contains('selected')) {
            this.classList.remove('selected');
            selected = selected.filter(el => el !== this);
            return; // Interrompiamo qui, non deve succedere "niente altro"
        }

        // Caso 2: Il blocco non è selezionato -> lo aggiungiamo
        this.classList.add('selected');
        selected.push(this);
        
        // Solo quando arriviamo a 2 blocchi diversi parte la semplificazione
        if (selected.length === 2) {
            simplify();
        }
    };
    container.appendChild(div);
}

        function simplify() {
    let [a, b] = selected;
    
    // CONTROLLO DI SICUREZZA: devono essere in righe diverse
    if (a.parentElement.id === b.parentElement.id) {
        alert("Puoi semplificare solo tra numeratore e denominatore!");
        selected.forEach(el => el.classList.remove('selected'));
        selected = [];
        return;
    }

    let c1 = a.dataset.content;
    let c2 = b.dataset.content;

    // Estrazione base ed esponente
    let match1 = c1.match(/^(.*?)(?:\^(\d+))?$/);
    let match2 = c2.match(/^(.*?)(?:\^(\d+))?$/);
    
    let base1 = match1[1];
    let exp1 = match1[2] ? parseInt(match1[2]) : 1;
    let base2 = match2[1];
    let exp2 = match2[2] ? parseInt(match2[2]) : 1;

    // Confronto basi con la logica delle parentesi virtuali
    if (areEquivalent(base1, base2)) {
        a.classList.add('simplified');
        b.classList.add('simplified');
        
        let diff = exp1 - exp2;
        if (diff > 0) {
            // Se vince il primo blocco (a), aggiungiamo il resto nella sua riga
            addBlock(a.parentElement, diff === 1 ? base1 : `${base1}^${diff}`);
        } else if (diff < 0) {
            // Se vince il secondo blocco (b), aggiungiamo il resto nella sua riga
            addBlock(b.parentElement, Math.abs(diff) === 1 ? base2 : `${base2}^${Math.abs(diff)}`);
        }
    } 
    else {
        alert("Basi non equivalenti!");
    }

            // ALLA FINE: Puliamo sempre tutto, a prescindere dal risultato
    a.classList.remove('selected');
    b.classList.remove('selected');
    selected.forEach(el => el.classList.remove('selected'));
    selected = [];
}

        function decomposeBlock() {
            if (selected.length !== 1) return alert("Seleziona 1 blocco!");
            let target = selected[0];
            let input = document.getElementById('splitInput').value;
            if (areEquivalent(target.dataset.content, input)) {
                parseToBlocks(input).forEach(p => addBlock(target.parentElement, p));
                target.remove();
            } else {
                alert("Scomposizione errata!");
            }
            selected = [];
        }

        function generateFraction() {
            ['numerator', 'denominator'].forEach(id => {
                const container = document.getElementById(id);
                container.innerHTML = '';
                parseToBlocks(document.getElementById(id === 'numerator' ? 'numInput' : 'denInput').value)
                .forEach(p => addBlock(container, p));
            });
        }
    </script>
</body>
</html>
