<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Semplificatore Algebrico</title>
    <style>
        .container { border: 2px solid #333; padding: 20px; margin: 10px; min-height: 50px; display: flex; gap: 10px; align-items: center; }
        .block { padding: 10px; border: 1px solid #ccc; cursor: pointer; user-select: none; background: #f9f9f9; }
        .block.selected { background: #add8e6; border-color: #0000ff; }
        .block.simplified { text-decoration: line-through; opacity: 0.5; pointer-events: none; }
    </style>
</head>
<body>

    <div id="numerator" class="container"></div>
    <div id="denominator" class="container"></div>

    <script>
        let selected = [];

        function areEquivalent(e1, e2) {
            try {
                const prepare = (str) => {
                    let s = "(" + str + ")";
                    return s.replace(/([a-zA-Z0-9])\(/g, '$1*(')
                            .replace(/\)\(/g, ')*(')
                            .replace(/\)([a-zA-Z0-9])/g, ')*$1')
                            .replace(/\^/g, '**');
                };
                const p1 = prepare(e1), p2 = prepare(e2);
                const vars = [...new Set((e1 + e2).match(/[a-z]/gi) || [])];
                for (let i = 0; i < 3; i++) {
                    let scope = {};
                    vars.forEach(v => scope[v] = Math.random() * 5 + 1);
                    const ev = (expr) => {
                        let s = expr;
                        vars.forEach(v => s = s.replace(new RegExp(v, 'g'), `(${scope[v]})`));
                        return eval(s);
                    };
                    if (Math.abs(ev(p1) - ev(p2)) > 0.001) return false;
                }
                return true;
            } catch(e) { return false; }
        }

        function parseToBlocks(expr) {
            expr = expr.replace(/\s+/g, '');
            let blocks = [];
            let current = "", balance = 0;
            for (let i = 0; i < expr.length; i++) {
                let char = expr[i];
                if (char === '(') balance++;
                else if (char === ')') balance--;
                current += char;
                if (balance === 0 && i < expr.length - 1) {
                    let next = expr[i+1];
                    if (next !== '^' && next !== '+' && next !== '-') {
                        blocks.push(current);
                        current = "";
                    }
                }
            }
            if (current) blocks.push(current);
            return blocks;
        }

        function addBlock(container, content) {
            let div = document.createElement('div');
            div.className = 'block';
            div.innerHTML = content.replace(/\^(\d+)/g, '<sup>$1</sup>');
            div.dataset.content = content;
            div.onclick = function() {
                if (this.classList.contains('simplified')) return;
                this.classList.toggle('selected');
                if (this.classList.contains('selected')) selected.push(this);
                else selected = selected.filter(el => el !== this);
                if (selected.length === 2) simplify();
            };
            container.appendChild(div);
        }

        function simplify() {
            let [a, b] = selected;
            if (a.parentElement === b.parentElement) {
                alert("Seleziona uno al numeratore e uno al denominatore!");
                selected.forEach(el => el.classList.remove('selected'));
                selected = [];
                return;
            }
            let c1 = a.dataset.content, c2 = b.dataset.content;
            let m1 = c1.match(/^(.*?)(?:\^(\d+))?$/), m2 = c2.match(/^(.*?)(?:\^(\d+))?$/);
            let b1 = m1[1], e1 = parseInt(m1[2] || 1), b2 = m2[1], e2 = parseInt(m2[2] || 1);

            if (areEquivalent(b1, b2)) {
                a.classList.add('simplified');
                b.classList.add('simplified');
                let diff = e1 - e2;
                if (diff > 0) addBlock(a.parentElement, diff === 1 ? b1 : `${b1}^${diff}`);
                else if (diff < 0) addBlock(b.parentElement, Math.abs(diff) === 1 ? b2 : `${b2}^${Math.abs(diff)}`);
            } else { alert("Non semplificabili!"); }
            selected.forEach(el => el.classList.remove('selected'));
            selected = [];
        }

        window.onload = () => {
            const num = parseToBlocks("x^2(x+3)(x-3)");
            const den = parseToBlocks("x(x-3)");
            num.forEach(b => addBlock(document.getElementById('numerator'), b));
            den.forEach(b => addBlock(document.getElementById('denominator'), b));
        };
    </script>
</body>
</html>
